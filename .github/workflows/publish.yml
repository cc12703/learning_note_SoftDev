

name: Docset Build and Publish
on: 
  push:
    tags:
      - "*"


jobs:
  build-and-publish:
    runs-on: ubuntu-22.04
    steps:
      - name: Prepare
        uses: actions/setup-node@v4
        with:
            node-version: '18'
      - run: sudo npm_config_user=root npm install -g @cc12703m/mddocsetbuilder@1.5.1


      - name: Checkout
        uses: actions/checkout@v4
        with:
            path: './source'


      - name: Build Docset
        run: mddocsetbuilder ./source -o ./out -n learning_note_SoftDev -p tgz 
        working-directory: ${{ github.workspace }}


      - name: Create Release and Upload Asset
        id: release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: Release Document
          files: ./out/learning_note_SoftDev.docset.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        
      
        
